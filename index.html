<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Trust Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Zilla+Slab:ital,wght@0,500;0,600;0,700;1,500&display=swap');

:root{
  --ink:#1B1D22;
  --paper:#FAF8F3;
  --card:#FFFFFF;
  --rule:#E4DFD3;
  --rule-strong:#D6CFBC;
  --red:#A8222F;
  --red-soft:#FBEEEE;
  --green:#1E6B4E;
  --green-soft:#EAF4EE;
  --gold:#9C7A3C;
  --gold-soft:#F6EFE1;
  --muted:#6F6A60;
  --muted-2:#9B958A;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',Tahoma,Arial,sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
::selection{background:var(--gold-soft)}

/* ===== LOGIN SCREEN ===== */
/* ===== SPLASH SCREEN ===== */
.splash-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:600;gap:1.5rem;transition:opacity .5s ease;padding:1rem}
.splash-screen.fade-out{opacity:0;pointer-events:none}
.splash-logo{max-width:200px;width:60%;height:auto;animation:splashFadeIn .6s ease}
.splash-bismillah{font-family:'Zilla Slab',serif;font-size:20px;font-weight:600;color:#fff;letter-spacing:.02em;text-align:center;animation:splashFadeIn .8s ease}
@keyframes splashFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:700px){
  .splash-logo{max-width:150px}
  .splash-bismillah{font-size:16px}
}

.login-screen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:500;padding:1rem}
.login-card{background:var(--card);border-radius:8px;padding:2rem 1.8rem;width:100%;max-width:340px;border-top:3px solid var(--gold);box-shadow:0 10px 40px rgba(0,0,0,.3)}
.login-logo{display:block;max-width:160px;margin:0 auto 1.3rem;height:auto}
.login-title{font-family:'Zilla Slab',serif;font-size:18px;font-weight:700;text-align:center;color:var(--ink);margin-bottom:1.3rem}
.login-field{margin-bottom:.9rem}
.login-field label{display:block;font-size:11.5px;font-weight:600;color:var(--muted);margin-bottom:5px}
.login-error{color:var(--red);font-size:12px;font-weight:600;text-align:center;min-height:16px;margin-bottom:.5rem}
.login-btn{width:100%;padding:10px;font-size:13px;margin-top:.3rem}
.conn-status{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:5px;flex-shrink:0;white-space:nowrap;transition:background .2s,color .2s}
.conn-status.conn-online{background:rgba(30,107,78,.18);color:#7FD9B5}
.conn-status.conn-offline{background:rgba(168,34,47,.22);color:#FF9E9E}
.offline-banner{display:none;position:fixed;top:62px;left:0;right:0;background:var(--gold);color:var(--ink);text-align:center;font-size:12.5px;font-weight:700;padding:8px 1rem;z-index:190;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.offline-banner.show{display:block}
@media(max-width:700px){
  .offline-banner{top:56px;font-size:11px;padding:7px .6rem}
}
.user-badge{font-size:11px;font-weight:600;color:#C8C4B8;display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-badge .role-tag{background:rgba(255,255,255,.1);padding:2px 9px;border-radius:4px;font-size:10px}
.user-badge .logout-btn{background:none;border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:5px;padding:4px 10px;cursor:pointer;font-size:11px;font-family:inherit}
.user-badge .logout-btn:hover{background:rgba(255,255,255,.1)}
@media(max-width:700px){
  .user-badge{display:none}
}

/* ===== MANAGER (READ-ONLY) ROLE RESTRICTIONS ===== */
body.role-manager .btn-new,
body.role-manager .btn-x,
body.role-manager .btn-del-page,
body.role-manager .erp-entry-toolbar,
body.role-manager .entry-mode-tabs,
body.role-manager .inv-builder,
body.role-manager input,
body.role-manager select,
body.role-manager .btn:not(.btn-sm):not(.month-tab),
body.role-manager .btn-sm:not([onclick*="print"]):not([onclick*="Month"]):not([onclick*="toggle"]):not([onclick*="open"]):not([onclick*="back"]),
body.role-manager .day-check-row .chk,
body.role-manager .ot-inp,
body.role-manager [onclick*="toggleRateEdit"]{display:none!important}
body.role-manager .erp-row{cursor:default}
body.role-manager .pname,body.role-manager .erp-detail-name{cursor:default;pointer-events:none}

/* ===== TOP NAV ===== */
.topnav{position:fixed;top:0;left:0;right:0;height:62px;background:var(--ink);border-bottom:3px solid var(--gold);display:flex;align-items:center;padding:0 1.1rem;z-index:200;gap:10px}
.topnav-logo{height:38px;object-fit:contain;flex-shrink:0;filter:brightness(0) invert(1) drop-shadow(0 0 0 transparent);background:#fff;border-radius:6px;padding:3px 8px}
.topnav-tabs{display:flex;gap:2px;flex:1;justify-content:center;flex-wrap:wrap}
.topnav-select{display:none}
.tab-btn{padding:9px 16px;border-radius:0;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:12.5px;font-weight:600;font-family:inherit;background:transparent;color:#C8C4B8;white-space:nowrap;letter-spacing:.2px;transition:color .15s,border-color .15s}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:#fff;border-bottom-color:var(--gold)}
.mob-menu{display:none;background:none;border:none;font-size:20px;cursor:pointer;color:#fff;padding:4px;flex-shrink:0}

/* ===== LAYOUT ===== */
.layout{display:flex;padding-top:62px;min-height:100vh}
.sidebar{position:fixed;top:62px;right:0;width:226px;height:calc(100vh - 62px);background:var(--card);border-left:1px solid var(--rule);display:flex;flex-direction:column;z-index:100;transition:transform .2s}
.sidebar-hd{padding:1rem .95rem .85rem}
.sidebar-title{font-size:11px;font-weight:700;color:var(--muted-2);margin-bottom:9px;text-transform:uppercase;letter-spacing:.08em}
.btn-new{width:100%;padding:8px;background:var(--ink);color:#fff;border:none;border-radius:5px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;letter-spacing:.1px}
.btn-new:hover{background:#000}
.pages-list{flex:1;overflow-y:auto;padding:6px}
.pi{display:flex;align-items:center;justify-content:space-between;padding:8px 9px;border-radius:5px;cursor:pointer;margin-bottom:1px;border-right:2px solid transparent}
.pi:hover{background:var(--paper)}
.pi.active{background:var(--gold-soft);border-right-color:var(--gold)}
.pi-left{display:flex;flex-direction:column;gap:2px;flex:1;min-width:0}
.pi-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.pi-sub{font-size:10.5px;color:var(--muted-2);font-variant-numeric:tabular-nums}
.pi-sub.pos{color:var(--red)}
.pi-sub.neg{color:var(--green)}
.btn-x{background:none;border:none;cursor:pointer;color:var(--muted-2);font-size:15px;padding:2px 3px;flex-shrink:0;border-radius:4px}
.btn-x:hover{color:var(--red);background:var(--red-soft)}
.sidebar-ft{padding:8px;border-top:1px solid var(--rule);font-size:10.5px;color:var(--muted-2);text-align:center;font-weight:600;letter-spacing:.04em}

.main{margin-right:226px;padding:1.4rem 1.6rem;flex:1;min-width:0}
.section{display:none}
.section.active{display:block}
.page-view{display:none}
.page-view.active{display:block}

/* ===== WELCOME ===== */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:55vh;color:var(--muted-2);text-align:center;gap:10px}
.welcome h2{font-size:15px;font-weight:600;color:var(--muted);font-family:'Cairo',sans-serif}

/* ===== CARDS ===== */
.card{background:var(--card);border:1px solid var(--rule);border-top:2px solid var(--rule-strong);border-radius:6px;padding:1rem 1.15rem;margin-bottom:.9rem}
.card-title{font-size:12.5px;font-weight:700;margin-bottom:11px;color:var(--ink);letter-spacing:.01em;display:flex;align-items:center;gap:6px}

/* ===== METRICS ===== */
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.1rem}
.metric{background:var(--card);border:1px solid var(--rule);border-radius:6px;padding:.85rem .7rem;text-align:center;position:relative}
.metric::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:var(--rule-strong);border-radius:6px 6px 0 0}
.metric-label{font-size:10.5px;color:var(--muted);margin-bottom:5px;font-weight:600;letter-spacing:.02em}
.metric-val{font-size:19px;font-weight:700;font-variant-numeric:tabular-nums;font-family:'Zilla Slab',serif}
.metric-val.red{color:var(--red)}
.metric-val.green{color:var(--green)}

/* ===== INPUTS ===== */
.input-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
input[type=number],input[type=text],input[type=date],input[type=time],select{
  border:1px solid var(--rule-strong);border-radius:5px;padding:7px 11px;font-size:12.5px;outline:none;
  background:var(--paper);color:var(--ink);font-family:inherit;width:100%;transition:border-color .15s,background .15s
}
input:focus,select:focus{border-color:var(--gold);background:#fff}
input::placeholder{color:var(--muted-2)}

/* ===== BUTTONS ===== */
.btn{padding:7px 15px;border-radius:5px;border:1px solid var(--rule-strong);cursor:pointer;font-size:12.5px;font-weight:600;font-family:inherit;background:#fff;color:var(--ink);white-space:nowrap;transition:all .15s}
.btn:hover{background:var(--paper);border-color:var(--muted-2)}
.btn-red{border-color:var(--red);color:var(--red);background:#fff}
.btn-red:hover{background:var(--red-soft)}
.btn-green{border-color:var(--green);color:var(--green);background:#fff}
.btn-green:hover{background:var(--green-soft)}
.btn-dark{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-dark:hover{background:#000}
.btn-sm{font-size:11px;padding:4px 9px;color:var(--muted);border-color:var(--rule);font-weight:600;white-space:nowrap}
.btn-sm:hover{color:var(--ink);border-color:var(--muted-2)}

/* ===== TABLES ===== */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--paper);padding:8px 10px;text-align:right;font-weight:700;color:var(--muted);border-bottom:2px solid var(--rule-strong);white-space:nowrap;font-size:11px;letter-spacing:.02em;text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid var(--rule);vertical-align:middle;font-variant-numeric:tabular-nums}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(156,122,60,.04)}

/* ===== BADGES ===== */
.badge{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:4px;letter-spacing:.02em}
.b-sell{background:#E9F1FA;color:#1A5E96}
.b-pay{background:var(--green-soft);color:var(--green)}
.b-buy{background:var(--red-soft);color:var(--red)}
.b-pres{background:var(--green-soft);color:var(--green)}
.b-abs{background:var(--red-soft);color:var(--red)}

/* ===== PAGE TOP ===== */
.page-top{display:flex;align-items:center;gap:9px;margin-bottom:1.1rem;flex-wrap:wrap;border-bottom:2px solid var(--ink);padding-bottom:.7rem;position:relative}
.page-top::after{content:'';position:absolute;bottom:-4px;right:0;width:46px;height:2px;background:var(--gold)}
.pname{font-size:18px;font-weight:700;cursor:pointer;border-bottom:2px dashed transparent;font-family:'Zilla Slab',serif;color:var(--ink)}
.pname:hover{border-color:var(--rule-strong)}
.pname-inp{font-size:18px;font-weight:700;border:none;border-bottom:2px solid var(--ink);outline:none;background:transparent;font-family:'Zilla Slab',serif;color:var(--ink);width:165px;display:none}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:9px 18px;border-radius:5px;font-size:12.5px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;border-bottom:2px solid var(--gold)}
.toast.show{opacity:1}

/* ===== OVERVIEW STATS (customers landing) ===== */
.ov-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.1rem}
.ov-stat{background:var(--card);border:1px solid var(--rule);border-radius:6px;padding:.9rem .75rem;text-align:center;position:relative}
.ov-stat::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:var(--gold);border-radius:6px 6px 0 0}
.ov-stat-label{font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.ov-stat-val{font-size:18px;font-weight:700;font-family:'Zilla Slab',serif;font-variant-numeric:tabular-nums}

/* ===== SALARY STATS ===== */
.sal-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:1.1rem}
.ss{background:var(--card);border:1px solid var(--rule);border-radius:6px;padding:.75rem .6rem;text-align:center}
.ss-label{font-size:10px;color:var(--muted);margin-bottom:4px;font-weight:600}
.ss-val{font-size:16px;font-weight:700;font-family:'Zilla Slab',serif;font-variant-numeric:tabular-nums}

/* ===== MONTHLY TABS ===== */
.month-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:.9rem}
.month-tab{padding:5px 12px;border-radius:4px;border:1px solid var(--rule-strong);cursor:pointer;font-size:11px;font-weight:600;background:#fff;font-family:inherit;color:var(--muted)}
.month-tab.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* ===== EMPLOYEE CARDS ===== */
.emp-card{background:var(--card);border:1px solid var(--rule);border-radius:6px;margin-bottom:.85rem;overflow:hidden}
.emp-card-hd{display:flex;align-items:center;justify-content:space-between;padding:.75rem .95rem;cursor:pointer;background:var(--paper);border-bottom:1px solid var(--rule);gap:6px}
.emp-card-hd:hover{background:#F3EEE3}
.emp-name{font-size:13.5px;font-weight:700;color:var(--ink)}
.emp-summary{font-size:11px;color:var(--muted);margin-top:3px}
.emp-body{padding:.85rem;display:none}
.emp-body.open{display:block}
.emp-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.85rem}
.emp-meta span{background:var(--paper);border:1px solid var(--rule);padding:4px 10px;border-radius:4px;font-size:11.5px;font-weight:600;color:var(--ink)}
.rate-edit-row{background:var(--gold-soft);border:1px solid var(--gold);border-radius:6px;padding:.75rem;margin-bottom:.85rem}

/* ===== DAILY CHECKLIST ===== */
.day-check-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--rule);flex-wrap:wrap}
.day-check-row:last-child{border-bottom:none}
.day-label{font-size:12.5px;font-weight:600;min-width:84px;color:var(--ink)}
.chk{width:17px;height:17px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.ot-inp{width:78px!important;padding:4px 8px!important;font-size:11.5px!important}

/* ===== ORDERS ===== */
.ord-day-card{background:var(--card);border:1px solid var(--rule);border-radius:6px;margin-bottom:.85rem;overflow:hidden}
.ord-day-hd{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;background:var(--paper);border-bottom:1px solid var(--rule);cursor:pointer}
.ord-day-hd:hover{background:#F3EEE3}
.ord-day-title{font-size:14px;font-weight:700;color:var(--ink);font-family:'Zilla Slab',serif}
.ord-day-sub{font-size:11px;color:var(--muted);margin-top:3px}
.ord-day-body{padding:.9rem;display:none}
.ord-day-body.open{display:block}
.ord-item-row{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--rule);flex-wrap:wrap}
.ord-item-row:last-child{border-bottom:none}
.ord-item-name{font-size:13px;font-weight:600;flex:1;min-width:80px;color:var(--ink)}
.ord-item-qty{font-size:11.5px;color:var(--ink);background:var(--paper);border:1px solid var(--rule);padding:2px 9px;border-radius:4px;white-space:nowrap;font-weight:600}
.ord-item-note{font-size:11px;color:var(--muted)}
.ord-check{width:18px;height:18px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.ord-done{text-decoration:line-through;color:var(--muted-2)}
.ord-carried{background:var(--gold-soft);border-right:3px solid var(--gold);margin-right:-3px;padding-right:9px}
.ord-carried-badge{font-size:10px;font-weight:700;background:#fff;color:var(--gold);border:1px solid var(--gold);padding:2px 7px;border-radius:4px;white-space:nowrap}

/* ===== CUSTOMERS ERP MODULE ===== */
.erp-wrap{padding:1.4rem 1.6rem}
.erp-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;flex-wrap:wrap}
.erp-search{flex:1;min-width:180px;position:relative}
.erp-search input{padding-right:32px}
.erp-search::before{content:'&#x1F50D;';position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;opacity:.5;pointer-events:none}
.erp-title-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px}
.erp-title{font-family:'Zilla Slab',serif;font-size:20px;font-weight:700;color:var(--ink)}
.erp-subtitle{font-size:12px;color:var(--muted)}
.erp-table-card{background:var(--card);border:1px solid var(--rule);border-radius:6px;overflow:hidden}
.erp-table-card table{font-size:13px}
.erp-table-card th{position:sticky;top:0;background:var(--paper);z-index:1}
.erp-row{cursor:pointer;transition:background .1s}
.erp-row:hover td{background:var(--gold-soft)}
.erp-row td{font-weight:500}
.erp-row .erp-name-cell{font-weight:700;color:var(--ink)}
.erp-row .erp-bal-pos{color:var(--red);font-weight:700}
.erp-row .erp-bal-neg{color:var(--green);font-weight:700}
.erp-row .erp-bal-zero{color:var(--muted)}
.erp-foot-row td{background:var(--ink);color:#fff;font-weight:700;border-bottom:none;position:sticky;bottom:0}
.erp-foot-row td.foot-label{color:#C8C4B8;font-weight:600}
.erp-empty-state{text-align:center;padding:3rem 1rem;color:var(--muted-2)}
.erp-empty-state h3{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:6px}
.erp-empty-state p{font-size:12px}
.erp-back{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;margin-bottom:1rem;width:fit-content}
.erp-back:hover{color:var(--ink)}
.erp-detail-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;border-bottom:2px solid var(--ink);padding-bottom:.85rem;margin-bottom:1.1rem;position:relative}
.erp-detail-header::after{content:'';position:absolute;bottom:-4px;right:0;width:46px;height:2px;background:var(--gold)}
.erp-detail-name{font-family:'Zilla Slab',serif;font-size:21px;font-weight:700;color:var(--ink);cursor:pointer;border-bottom:2px dashed transparent}
.erp-detail-name:hover{border-color:var(--rule-strong)}
.erp-detail-name-inp{font-family:'Zilla Slab',serif;font-size:21px;font-weight:700;border:none;border-bottom:2px solid var(--ink);outline:none;background:transparent;color:var(--ink);width:200px;display:none}
.erp-detail-actions{display:flex;gap:7px;flex-wrap:wrap}
.erp-statline{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:1.1rem;padding:.85rem 1rem;background:var(--card);border:1px solid var(--rule);border-radius:6px}
.erp-stat-item{display:flex;flex-direction:column;gap:2px}
.erp-stat-item .lbl{font-size:10.5px;font-weight:600;color:var(--muted);letter-spacing:.02em}
.erp-stat-item .val{font-size:16.5px;font-weight:700;font-family:'Zilla Slab',serif;font-variant-numeric:tabular-nums}
.erp-entry-toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap;padding:.85rem 1rem;background:var(--card);border:1px solid var(--rule);border-top:2px solid var(--gold);border-radius:6px;margin-bottom:1rem}
.erp-ledger-table th:last-child,.erp-ledger-table td:last-child{text-align:left}
.erp-running{font-variant-numeric:tabular-nums;color:var(--muted)}

/* ===== INVOICE LINE-ITEM BUILDER ===== */
.inv-builder{background:var(--card);border:1px solid var(--rule);border-top:2px solid var(--gold);border-radius:6px;padding:1rem;margin-bottom:1rem}
.inv-lines-hd{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;font-size:10.5px;font-weight:700;color:var(--muted);letter-spacing:.02em;padding:0 2px 6px;text-transform:uppercase}
.inv-line{display:grid;grid-template-columns:2fr 1fr 1fr 1fr auto;gap:8px;align-items:center;padding:5px 0}
.inv-line input{padding:6px 9px;font-size:12.5px}
.inv-line-total{font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);text-align:left;padding-left:4px}
.inv-line-del{background:none;border:none;cursor:pointer;color:var(--muted-2);font-size:16px}
.inv-line-del:hover{color:var(--red)}
.inv-add-line{font-size:11.5px;font-weight:600;color:var(--gold);background:none;border:1px dashed var(--gold);border-radius:5px;padding:6px 12px;cursor:pointer;margin-top:6px}
.inv-add-line:hover{background:var(--gold-soft)}
.inv-builder-foot{display:flex;align-items:center;justify-content:space-between;margin-top:.85rem;padding-top:.75rem;border-top:1px solid var(--rule);flex-wrap:wrap;gap:10px}
.inv-grand-total{font-size:17px;font-weight:700;font-family:'Zilla Slab',serif;color:var(--ink)}
.entry-mode-tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid var(--rule)}
.entry-mode-tab{padding:8px 18px;font-size:12.5px;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer}
.entry-mode-tab.active{color:var(--ink);border-bottom-color:var(--gold)}
.inv-item-line{font-size:12px;color:var(--muted);padding:2px 0}

/* ===== EXPENSES ===== */
.exp-cat-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:4px;letter-spacing:.01em}
.exp-cat-salary{background:#E9F1FA;color:#1A5E96}
.exp-cat-purchase{background:var(--red-soft);color:var(--red)}
.exp-cat-maintenance{background:var(--gold-soft);color:var(--gold)}
.exp-cat-other{background:#EFEDE8;color:var(--muted)}
.exp-in-row td{color:var(--green)}
.exp-out-row td{color:var(--red)}

/* ===== EXIT PERMIT ===== */
.permit-wrap{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem}
.permit-toolbar{width:100%;max-width:680px;display:flex;justify-content:flex-end;margin-bottom:1rem}
.permit-doc{width:100%;max-width:680px;background:#fff;border:1px solid var(--rule);border-radius:4px;padding:2.5rem 2.5rem 3rem;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.permit-doc-logo{display:block;max-width:170px;margin:0 auto 1.4rem}
.permit-doc-title{font-family:'Zilla Slab',serif;font-size:24px;font-weight:700;text-align:center;color:var(--ink);margin-bottom:.3rem;letter-spacing:.02em}
.permit-doc-subtitle{text-align:center;font-size:12px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:1.8rem}
.permit-rule{height:2px;background:var(--gold);width:60px;margin:0 auto 2rem}
.permit-date-row{display:flex;justify-content:center;gap:2.5rem;margin-bottom:2.5rem;flex-wrap:wrap}
.permit-date-item{text-align:center}
.permit-date-item .lbl{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;letter-spacing:.03em}
.permit-date-item .val{font-size:17px;font-weight:700;color:var(--ink);font-family:'Zilla Slab',serif}
.permit-body-note{text-align:center;color:var(--muted);font-size:13px;margin-bottom:3rem;line-height:1.8}
.permit-sign-row{display:flex;justify-content:space-between;gap:2rem;margin-top:2.5rem;flex-wrap:wrap}
.permit-sign-box{flex:1;min-width:200px;text-align:center}
.permit-sign-line{border-bottom:1.5px solid var(--ink);height:50px;margin-bottom:8px}
.permit-sign-label{font-size:12px;font-weight:600;color:var(--ink)}
@media print{
  .permit-toolbar{display:none!important}
  .permit-wrap{padding:0}
  .permit-doc{box-shadow:none;border:none;max-width:100%}
}
@media(max-width:700px){
  .permit-doc{padding:1.6rem 1.3rem 2rem}
  .permit-date-row{gap:1.3rem}
  .permit-sign-row{flex-direction:column;gap:2rem}
}

/* ===== PRINT ===== */
@media print{
  .topnav,.sidebar,.mob-menu,.btn,.btn-sm,.btn-x,.btn-new,.pname-inp,.no-print{display:none!important}
  .layout,.section,.page-view,#main-wrap,.erp-wrap{display:none!important}
  body{background:#fff}
  .print-invoice{display:block!important}
  /* exit permit prints itself directly, bypassing the generic hide-all rule above */
  body.printing-exit-permit .layout,
  body.printing-exit-permit #main-wrap,
  body.printing-exit-permit #section-exitpermit{display:block!important;margin:0!important;padding:0!important}
}
.print-invoice{display:none;padding:1.5rem;font-size:13px;font-family:'Cairo',sans-serif}
.print-invoice h2{text-align:center;margin-bottom:.5rem;font-family:'Zilla Slab',serif}
.print-invoice .inv-meta{text-align:center;color:var(--muted);margin-bottom:1rem;font-size:12px}

/* ===== MOBILE ===== */
@media(max-width:700px){
  .mob-menu{display:block}
  .sidebar{transform:translateX(105%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-right:0!important;padding:.75rem}
  .topnav{padding:0 .6rem;gap:6px;height:56px}
  .topnav-tabs{display:none}
  .topnav-select{display:block;flex:1;max-width:140px;font-size:12px;font-weight:600;padding:6px 8px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:#22252B;color:#fff;font-family:inherit}
  .layout{padding-top:56px}
  .sidebar{top:56px;height:calc(100vh - 56px)}
  .topnav-logo{height:28px}
  .tab-btn{padding:6px 8px;font-size:10.5px}
  .metrics,.ov-stats{grid-template-columns:1fr 1fr}
  .metric:last-child,.ov-stat:last-child{grid-column:span 2}
  .sal-stats{grid-template-columns:1fr 1fr}
  .input-row{flex-direction:column;align-items:stretch}
  .input-row .btn{width:100%}
  .input-row>div{flex:1 1 auto!important;width:100%}
  table{min-width:360px}
  th,td{padding:6px 7px;font-size:11px;white-space:nowrap}
  .emp-card-hd{flex-wrap:nowrap}
  .emp-name{font-size:12.5px}
  .emp-summary{font-size:10.5px}
  .emp-body{padding:.6rem}
  .pname,.pname-inp{font-size:16px}

  /* login screen */
  .login-card{padding:1.6rem 1.3rem;max-width:100%}
  .login-logo{max-width:130px}

  /* customers ERP module */
  .erp-wrap{padding:.85rem .7rem}
  .erp-title-row{flex-direction:column;align-items:stretch;gap:10px}
  .erp-title-row .btn{width:100%}
  .erp-title{font-size:17px}
  .erp-statline{gap:12px;padding:.7rem .8rem}
  .erp-stat-item .val{font-size:14px}
  .erp-toolbar{flex-direction:column;align-items:stretch}
  .erp-search{min-width:0}
  .erp-table-card table{min-width:480px}
  .erp-detail-header{flex-direction:column;align-items:stretch}
  .erp-detail-actions{width:100%}
  .erp-detail-actions .btn{flex:1}
  .erp-detail-name,.erp-detail-name-inp{font-size:17px;width:100%}
  .erp-entry-toolbar{flex-direction:column;align-items:stretch;padding:.75rem}
  .erp-entry-toolbar>div{flex:1 1 auto!important;width:100%}
  .erp-entry-toolbar .btn{width:100%}
  .erp-ledger-table{min-width:560px}

  /* entry mode tabs */
  .entry-mode-tabs{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .entry-mode-tab{padding:8px 12px;font-size:11.5px;white-space:nowrap}

  /* invoice line builder — collapse grid to stacked card per line */
  .inv-builder{padding:.8rem .7rem}
  .inv-lines-hd{display:none}
  .inv-line{display:grid;grid-template-columns:1fr 1fr;grid-template-areas:"name name" "price qty" "total del";gap:6px;padding:.6rem;background:var(--paper);border:1px solid var(--rule);border-radius:6px;margin-bottom:6px}
  .inv-line input:nth-of-type(1){grid-area:name}
  .inv-line input:nth-of-type(2){grid-area:price}
  .inv-line input:nth-of-type(3){grid-area:qty}
  .inv-line-total{grid-area:total;text-align:right;font-size:13px}
  .inv-line-del{grid-area:del;justify-self:left;font-size:18px}
  .inv-add-line{width:100%}
  .inv-builder-foot{flex-direction:column;align-items:stretch;gap:8px}
  .inv-builder-foot .btn{width:100%}
  .inv-grand-total{text-align:center}

  /* user badge collapses, show role only via topnav title area on mobile */
  .user-badge{display:none}
}

@media(max-width:420px){
  .topnav-tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start}
  .tab-btn{flex-shrink:0}
}

</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore,collection,doc,addDoc,setDoc,deleteDoc,onSnapshot,query,orderBy,serverTimestamp,writeBatch,enableIndexedDbPersistence,enableMultiTabIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth,signInWithEmailAndPassword,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseApp=initializeApp({apiKey:"AIzaSyCdT6hp9NQvCee1R-IkjCEE4mx3m483VDw",authDomain:"trust-group-3796d.firebaseapp.com",projectId:"trust-group-3796d",storageBucket:"trust-group-3796d.firebasestorage.app",messagingSenderId:"1096868997914",appId:"1:1096868997914:web:05bd68204a10749ebf5aa3"});
const db=getFirestore(firebaseApp);
const auth=getAuth(firebaseApp);

// Enable offline persistence: data already loaded gets cached locally, and
// any writes made while offline are queued and auto-synced once back online.
// Try multi-tab first (allows opening the site in several tabs at once);
// fall back to single-tab persistence if multi-tab isn't supported in this browser.
enableMultiTabIndexedDbPersistence(db).catch(()=>{
  enableIndexedDbPersistence(db).catch(err=>{
    console.warn('Offline persistence unavailable:',err?.code);
  });
});

// ===== ROLE CONFIG =====
// data_entry = full access. manager = read-only stats access.
const USER_ROLES={
  'trustgroup1010@gmail.com':{role:'data_entry',label:'مدخل البيانات'},
  'ibrahimhanielaw@gmail.com':{role:'manager',label:'مدير'},
  'm077ammmed@gmail.com':{role:'manager',label:'مدير'}
};
let currentUserRole=null;
let currentUserEmail=null;

window.doLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('login-submit-btn');
  errEl.textContent='';
  if(!email||!pass){errEl.textContent='ادخل البريد الإلكتروني وكلمة المرور';return}
  btn.disabled=true;btn.textContent='جاري الدخول...';
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    errEl.textContent='بيانات الدخول غير صحيحة';
    btn.disabled=false;btn.textContent='دخول';
  }
};

window.doLogout=async function(){
  await signOut(auth);
};

onAuthStateChanged(auth,(user)=>{
  const loginScreen=document.getElementById('login-screen');
  const appRoot=document.getElementById('app-root');
  const btn=document.getElementById('login-submit-btn');
  if(user){
    currentUserEmail=user.email;
    const roleInfo=USER_ROLES[user.email]||{role:'manager',label:'مستخدم'};
    currentUserRole=roleInfo.role;
    loginScreen.style.display='none';
    appRoot.style.display='block';
    document.getElementById('user-badge').innerHTML=`<span class="role-tag">${roleInfo.label}</span><span>${user.email}</span><button class="logout-btn" onclick="doLogout()">خروج</button>`;
    applyRolePermissions();
  }else{
    currentUserRole=null;currentUserEmail=null;
    loginScreen.style.display='flex';
    appRoot.style.display='none';
    if(btn){btn.disabled=false;btn.textContent='دخول'}
    document.getElementById('login-email').value='';
    document.getElementById('login-password').value='';
  }
});

function applyRolePermissions(){
  const isManager=currentUserRole==='manager';
  document.body.classList.toggle('role-manager',isManager);
}

// ===== CONNECTION STATUS (online/offline) =====
let pendingWrites=0;
function updateConnUI(){
  const statusEl=document.getElementById('conn-status');
  const banner=document.getElementById('offline-banner');
  if(!statusEl)return;
  if(navigator.onLine){
    statusEl.textContent='&#x1F7E2; متصل';
    statusEl.className='conn-status conn-online';
    banner.classList.remove('show');
  }else{
    statusEl.textContent='&#x1F534; غير متصل';
    statusEl.className='conn-status conn-offline';
    banner.classList.add('show');
  }
}
window.addEventListener('online',()=>{updateConnUI();toast('&#x1F7E2; رجع الاتصال — جاري مزامنة البيانات...');});
window.addEventListener('offline',()=>{updateConnUI();toast('&#x1F534; لا يوجد اتصال — البيانات بتُحفظ محلياً');});
updateConnUI();

let curSection='debtors',curPage={debtors:null,customers:null,salaries:null},pages={debtors:{},customers:{},salaries:{}},employees={},curMonth={};

function fmt(n){return Number(n||0).toLocaleString('ar-EG')}
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500)}
function today(){return new Date().toISOString().slice(0,10)}
function getDaysInMonth(ym){const[y,m]=ym.split('-').map(Number);const days=[];const t=new Date(y,m,0).getDate();for(let d=1;d<=t;d++)days.push(ym+'-'+String(d).padStart(2,'0'));return days}
function getAllMonths(emp){const s=new Set();Object.values(emp.attendance||{}).forEach(a=>{if(a.date)s.add(a.date.slice(0,7))});Object.values(emp.advances||{}).forEach(a=>{if(a.isoDate)s.add(a.isoDate.slice(0,7))});return[...s].sort().reverse()}

window.switchSection=function(sec,btn){
  curSection=sec;
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.getElementById('section-'+sec).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const selEl=document.getElementById('topnav-select');if(selEl)selEl.value=sec;
  document.getElementById('sb-label').textContent={debtors:'المدين',customers:'العملاء',salaries:'المرتبات',orders:'الطلبات',expenses:'المصاريف',exitpermit:'إذن خروج'}[sec]||'';
  document.getElementById('sb-add').textContent={debtors:'+ إضافة حساب',customers:'+ إضافة عميل',salaries:'+ إضافة قسم',orders:''}[sec]||'';
  document.getElementById('sb-add').style.display=(sec==='orders'||sec==='expenses'||sec==='customers'||sec==='exitpermit')?'none':'block';
  document.getElementById('sidebar').style.display=(sec==='customers'||sec==='exitpermit')?'none':'flex';
  document.getElementById('main-wrap').style.marginRight=(sec==='customers'||sec==='exitpermit')?'0':'226px';
  if(sec==='customers')renderCustomersERP();
  if(sec==='debtors')renderDebtorsStats();
  if(sec==='orders')renderOrdersPage();
  if(sec==='expenses')renderExpensesPage();
  if(sec==='exitpermit')renderExitPermit();
  renderSidebar();
};
window.sidebarAdd=function(){curSection==='salaries'?newSalaryDept():newPage(curSection)};
window.toggleSidebar=function(){document.getElementById('sidebar').classList.toggle('open')};
window.closeSidebar=function(){document.getElementById('sidebar').classList.remove('open')};

function listenSection(sec){
  onSnapshot(query(collection(db,sec),orderBy('createdAt')),snap=>{
    const ids=snap.docs.map(d=>d.id);
    Object.keys(pages[sec]).forEach(id=>{if(!ids.includes(id)){delete pages[sec][id];document.getElementById(sec+'-page-'+id)?.remove();if(curPage[sec]===id){curPage[sec]=null;if(sec==='customers'){curCustId=null;}else showWelcome(sec)}}});
    snap.docs.forEach(d=>{if(!pages[sec][d.id]){pages[sec][d.id]={id:d.id,name:d.data().name,entries:{}};listenEntries(sec,d.id)}else pages[sec][d.id].name=d.data().name});

function calcBal(page,isSell){
  const e=Object.values(page.entries||{});
  const sell=e.filter(x=>x.type===(isSell?'sell':'buy')).reduce((s,x)=>s+x.amount,0);
  const pay=e.filter(x=>x.type==='pay').reduce((s,x)=>s+x.amount,0);
  return{sell,pay,bal:sell-pay};
}

function renderDebtorsStats(){
  const el=document.getElementById('debtors-stats');if(!el)return;
  const arr=Object.values(pages.debtors);
  if(!arr.length){el.innerHTML='';return}
  let tBuy=0,tPay=0,tBal=0,debtorCount=0,creditorCount=0;
  arr.forEach(p=>{
    const{sell,pay,bal}=calcBal(p,false);
    tBuy+=sell;tPay+=pay;tBal+=bal;
    if(bal>0)debtorCount++;
    else if(bal<0)creditorCount++;
  });
  el.innerHTML=`
    <div class="ov-stats">
      <div class="ov-stat"><div class="ov-stat-label">&#x1F6D2; إجمالي الشراء</div><div class="ov-stat-val" style="color:#A8222F">${fmt(tBuy)}</div></div>
      <div class="ov-stat"><div class="ov-stat-label">&#x2705; إجمالي السداد</div><div class="ov-stat-val" style="color:#1E6B4E">${fmt(tPay)}</div></div>
      <div class="ov-stat"><div class="ov-stat-label">&#x1F4CA; إجمالي المتبقي</div><div class="ov-stat-val" style="color:${tBal>0?'#A8222F':'#1E6B4E'}">${fmt(Math.abs(tBal))}</div></div>
    </div>
    <div class="ov-stats" style="margin-bottom:1.1rem">
      <div class="ov-stat"><div class="ov-stat-label">&#x1F465; عدد الحسابات</div><div class="ov-stat-val">${arr.length}</div></div>
      <div class="ov-stat"><div class="ov-stat-label">&#x1F534; حسابات مدينة (عليها)</div><div class="ov-stat-val" style="color:#A8222F">${debtorCount}</div></div>
      <div class="ov-stat"><div class="ov-stat-label">&#x1F7E2; حسابات دائنة (لها)</div><div class="ov-stat-val" style="color:#1E6B4E">${creditorCount}</div></div>
    </div>`;
}

function renderCustomerList(){
  curCustId=null;
  const root=document.getElementById('customers-root');if(!root)return;
  const allArr=Object.values(pages.customers);
  const arr=custSearchTerm
    ? allArr.filter(p=>p.name.toLowerCase().includes(custSearchTerm.toLowerCase()))
    : allArr;

  let tSell=0,tPay=0,tBal=0;
  allArr.forEach(p=>{const{sell,pay,bal}=calcBal(p,true);tSell+=sell;tPay+=pay;tBal+=bal});

  const rows=arr.sort((a,b)=>a.name.localeCompare(b.name,'ar')).map(p=>{
    const{sell,pay,bal}=calcBal(p,true);
    const balCls=bal>0?'erp-bal-pos':bal<0?'erp-bal-neg':'erp-bal-zero';
    const balTxt=bal===0?'مسوّى':fmt(Math.abs(bal));
    return `<tr class="erp-row" onclick="openCustomer('${p.id}')">
      <td class="erp-name-cell">${p.name}</td>
      <td>${fmt(sell)}</td>
      <td>${fmt(pay)}</td>
      <td class="${balCls}">${balTxt}</td>
      <td style="text-align:left"><button class="btn btn-sm" onclick="event.stopPropagation();deleteCustomer('${p.id}')">حذف</button></td>
    </tr>`;
  }).join('');

  root.innerHTML=`
    <div class="erp-wrap">
      <div class="erp-title-row">
        <div>
          <div class="erp-title">سجل العملاء</div>
          <div class="erp-subtitle">${allArr.length} عميل مسجّل</div>
        </div>
        <button class="btn btn-dark" onclick="newCustomer()">+ عميل جديد</button>
      </div>

      ${allArr.length?`<div class="erp-statline">
        <div class="erp-stat-item"><span class="lbl">إجمالي المبيع</span><span class="val" style="color:#1A5E96">${fmt(tSell)}</span></div>
        <div class="erp-stat-item"><span class="lbl">إجمالي السداد</span><span class="val" style="color:var(--green)">${fmt(tPay)}</span></div>
        <div class="erp-stat-item"><span class="lbl">إجمالي المتبقي</span><span class="val" style="color:${tBal>0?'var(--red)':'var(--green)'}">${fmt(Math.abs(tBal))}</span></div>
      </div>`:''}

      <div class="erp-toolbar">
        <div class="erp-search"><input type="text" id="cust-search" placeholder="بحث باسم العميل..." value="${custSearchTerm}" oninput="filterCustomers(this.value)"/></div>
      </div>

      ${allArr.length===0?`<div class="erp-empty-state"><h3>لا يوجد عملاء بعد</h3><p>اضغط "+ عميل جديد" لإضافة أول عميل</p></div>`:
        arr.length===0?`<div class="erp-empty-state"><h3>لا نتائج</h3><p>جرّب اسماً آخر</p></div>`:
        `<div class="erp-table-card"><div class="tbl-wrap"><table>
          <thead><tr><th>اسم العميل</th><th>إجمالي البيع</th><th>إجمالي السداد</th><th>المتبقي</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div></div>`}
    </div>`;

        <div class="erp-detail-actions">
          <button class="btn btn-sm no-print" onclick="printCustomerInvoice('${id}')">&#x1F5A8; طباعة فاتورة</button>
          <button class="btn btn-sm no-print" onclick="clearCustomerEntries('${id}')">&#x1F5D1; مسح السجل</button>

        <div class="erp-stat-item"><span class="lbl">الرصيد الحالي</span><span class="val" style="color:${balColor}">${fmt(Math.abs(bal))} ${bal===0?'(مسوّى)':bal>0?'(له)':'(عليه)'}</span></div>

        <button class="entry-mode-tab ${custEntryMode==='sell'?'active':''}" onclick="setCustEntryMode('sell')">+ فاتورة بيع</button>

function calcEmpMonth(emp,month){
  const att=Object.values(emp.attendance||{}).filter(a=>a.date?.startsWith(month));
  const pDays=att.filter(a=>a.status==='present').length;
  const totalOT=att.reduce((s,a)=>s+(parseFloat(a.overtime)||0),0);
  const adv=Object.values(emp.advances||{}).filter(a=>(a.isoDate||'').startsWith(month));
  const totalAdv=adv.reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
  const base=pDays*(emp.dailyRate||0);const otPay=totalOT*(emp.overtimeRate||0);
  return{pDays,totalOT,base,otPay,totalAdv,net:base+otPay-totalAdv};
}
function calcEmpAll(emp){
  const att=Object.values(emp.attendance||{});
  const pDays=att.filter(a=>a.status==='present').length;
  const totalOT=att.reduce((s,a)=>s+(parseFloat(a.overtime)||0),0);
  const totalAdv=Object.values(emp.advances||{}).reduce((s,a)=>s+(parseFloat(a.amount)||0),0);
  const base=pDays*(emp.dailyRate||0);const otPay=totalOT*(emp.overtimeRate||0);
  return{pDays,totalOT,base,otPay,totalAdv,net:base+otPay-totalAdv};
}

let ordersData = {}; // date -> { items: {id -> item} }
let ordersUnsubscribe = null;

function listenOrders(){
  onSnapshot(query(collection(db,'orders'),orderBy('createdAt','desc')),snap=>{
    ordersData={};
    snap.docs.forEach(d=>{
      const data=d.data();
      const date=data.date||d.id;
      if(!ordersData[date])ordersData[date]={items:{}};
      ordersData[date].items[d.id]={id:d.id,...data};
    });
    if(curSection==='orders')renderOrdersPage();
  });
}

window.renderOrdersPage=function(){
  const el=document.getElementById('orders-content');if(!el)return;
  const todayStr=today();
  const todayAr=new Date(todayStr+'T00:00:00').toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  // collect all dates sorted desc
  const dates=[...new Set(Object.values(ordersData).flatMap(d=>Object.values(d.items).map(i=>i.date||''))).add(todayStr)].filter(Boolean).sort().reverse();

  // carry-over: pending items from previous days
  const pendingCarry=[];
  dates.filter(d=>d<todayStr).forEach(date=>{
    const items=Object.values(ordersData[date]?.items||{});
    items.filter(i=>!i.done).forEach(i=>pendingCarry.push({...i,carriedFrom:date}));
  });

  const addFormHTML=`<div class="card" style="margin-bottom:.85rem">
    <div class="card-title">&#x1F4CB; إضافة طلب ليوم: ${todayAr}</div>
    <div class="input-row">
      <div style="flex:2;min-width:100px"><input type="text" id="ord-name" placeholder="اسم الطلب"/></div>
      <div style="flex:0 0 80px"><input type="number" id="ord-qty" placeholder="الكمية" min="1"/></div>
      <div style="flex:2;min-width:80px"><input type="text" id="ord-note" placeholder="ملاحظة (اختياري)"/></div>
      <button class="btn btn-dark" onclick="addOrder('${todayStr}')">+ إضافة</button>
    </div>
  </div>`;

  const carryHTML=pendingCarry.length?`<div class="card" style="margin-bottom:.85rem;border-right:3px solid #f39c12">
    <div class="card-title" style="color:#856404">&#x23F3; طلبات مرحّلة (${pendingCarry.length})</div>
    ${pendingCarry.map(i=>`<div class="ord-item-row ord-carried">
      <input type="checkbox" class="ord-check" onchange="markOrderDone('${i.id}',this.checked)"/>
      <span class="ord-item-name">${i.name}</span>
      <span class="ord-item-qty">&#x00D7;${i.qty||1}</span>
      ${i.note?`<span class="ord-item-note">${i.note}</span>`:''}
      <span class="ord-carried-badge">من ${i.carriedFrom}</span>
      <button class="btn btn-sm" onclick="copyOrderToToday('${i.id}','${todayStr}')">نسخ لليوم</button>
      <button class="btn btn-sm" style="color:#A8222F" onclick="deleteOrder('${i.id}')">&#x00D7;</button>
    </div>`).join('')}
  </div>`:'';

  const daysHTML=dates.map(date=>{
    const items=Object.values(ordersData[date]?.items||{}).sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    if(!items.length&&date!==todayStr)return'';
    const dateAr=new Date(date+'T00:00:00').toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    const doneCount=items.filter(i=>i.done).length;
    const totalCount=items.length;
    const isToday=date===todayStr;
    const itemsHTML=items.length===0?'<p style="color:#bbb;font-size:12px;text-align:center;padding:.5rem">لا يوجد طلبات</p>':
      items.map(i=>`<div class="ord-item-row ${i.done?'ord-done':''}">
        <input type="checkbox" class="ord-check" ${i.done?'checked':''} onchange="markOrderDone('${i.id}',this.checked)"/>
        <span class="ord-item-name">${i.name}</span>
        <span class="ord-item-qty">&#x00D7;${i.qty||1}</span>
        ${i.note?`<span class="ord-item-note">${i.note}</span>`:''}
        ${!i.done&&!isToday?`<span class="ord-carried-badge">مرحّل</span>`:''}
        ${isToday?`<button class="btn btn-sm" style="color:#A8222F" onclick="deleteOrder('${i.id}')">&#x00D7;</button>`:''}
      </div>`).join('');
    return `<div class="ord-day-card">
      <div class="ord-day-hd" onclick="toggleDayCard('${date}')">
        <div>
          <div class="ord-day-title">${isToday?'&#x1F4C5; اليوم — ':''} ${dateAr}</div>
          <div class="ord-day-sub">${totalCount} طلب — تم تسليم ${doneCount} — متبقي ${totalCount-doneCount}</div>
        </div>
        <span id="oarr-${date}" style="color:#aaa;font-size:14px">&#x25BE;</span>
      </div>
      <div class="ord-day-body ${isToday?'open':''}" id="obody-${date}">
        ${isToday?`<div class="card" style="margin-bottom:.75rem">
          <div class="card-title">نسخ من يوم سابق</div>
          <div class="input-row">
            <select id="copy-from-date" style="flex:1">
              ${dates.filter(d=>d!==todayStr).map(d=>`<option value="${d}">${d}</option>`).join('')}
            </select>
            <button class="btn btn-dark" onclick="copyDayOrders(document.getElementById('copy-from-date').value,'${todayStr}')">نسخ الطلبات</button>
          </div>
        </div>`:''}
        ${itemsHTML}
      </div>
    </div>`;
  }).filter(Boolean).join('');

  el.innerHTML=addFormHTML+carryHTML+daysHTML;
};

  const b=document.getElementById('obody-'+date);const a=document.getElementById('oarr-'+date);

window.addOrder=async function(date){

  await addDoc(collection(db,'orders'),{name,qty:qty||1,note,date,done:false,createdAt:serverTimestamp()});

window.markOrderDone=async function(id,done){
  await setDoc(doc(db,'orders',id),{done},{merge:true});
  toast(done?'&#x2705; تم التسليم':'&#x21A9; تم الإلغاء');
};

window.deleteOrder=async function(id){
  await deleteDoc(doc(db,'orders',id));toast('&#x1F5D1; تم الحذف');
};

window.copyOrderToToday=async function(id,todayStr){
  const allItems=Object.values(ordersData).flatMap(d=>Object.values(d.items));
  const item=allItems.find(i=>i.id===id);if(!item)return;
  await addDoc(collection(db,'orders'),{name:item.name,qty:item.qty||1,note:item.note||'',date:todayStr,done:false,createdAt:serverTimestamp()});
  toast('&#x1F4CB; تم نسخ الطلب لليوم');
};

window.copyDayOrders=async function(fromDate,toDate){
  const items=Object.values(ordersData[fromDate]?.items||{});
  if(!items.length){toast('لا يوجد طلبات في هذا اليوم');return}
  if(!confirm('نسخ '+items.length+' طلب من '+fromDate+' لليوم؟'))return;
  const undoneItems=items.filter(i=>!i.done);
  for(const item of undoneItems){
    await addDoc(collection(db,'orders'),{name:item.name,qty:item.qty||1,note:item.note||'',date:toDate,done:false,createdAt:serverTimestamp()});
  }
  toast('&#x1F4CB; تم نسخ '+undoneItems.length+' طلب');
};

let expensesData = {}; // id -> entry
let curExpMonth = null;

const EXP_CATEGORIES = {
  salary:{label:'رواتب',cls:'exp-cat-salary'},
  purchase:{label:'مشتريات',cls:'exp-cat-purchase'},
  maintenance:{label:'صيانة',cls:'exp-cat-maintenance'},
  other:{label:'غيرها',cls:'exp-cat-other'}
};

function listenExpenses(){
  onSnapshot(query(collection(db,'expenses'),orderBy('createdAt','desc')),snap=>{
    expensesData={};
    snap.docs.forEach(d=>{expensesData[d.id]={id:d.id,...d.data()}});
    if(curSection==='expenses')renderExpensesPage();
  });
}

function getExpenseMonths(){
  const s=new Set();
  Object.values(expensesData).forEach(e=>{if(e.isoDate)s.add(e.isoDate.slice(0,7))});
  s.add(today().slice(0,7));
  return [...s].sort().reverse();
}

// Safe balance is calculated across ALL entries (lifetime), not just selected month —
// it represents the real current cash balance in the safe.
function calcSafeBalance(){
  const all=Object.values(expensesData);
  const totalIn=all.filter(e=>e.type==='in').reduce((s,e)=>s+e.amount,0);
  const totalOutFromSafe=all.filter(e=>e.type==='out'&&e.source==='safe').reduce((s,e)=>s+e.amount,0);
  return totalIn-totalOutFromSafe;
}

window.toggleExpSourceVisibility=function(){
  const type=document.getElementById('exp-type').value;
  const sourceWrap=document.getElementById('exp-source-wrap');
  sourceWrap.style.display=(type==='out')?'block':'none';
};

window.addExpense=async function(){
  const type=document.getElementById('exp-type').value;
  const cat=document.getElementById('exp-cat').value;
  const source=type==='out'?document.getElementById('exp-source').value:null;
  const amt=parseFloat(document.getElementById('exp-amt').value);
  const note=document.getElementById('exp-note').value.trim();
  if(!amt||amt<=0){alert('ادخل مبلغ صحيح');return}
  if(type==='out'&&source==='safe'){
    const safeBal=calcSafeBalance();
    if(amt>safeBal){ if(!confirm('المبلغ أكبر من رصيد الخزنة الحالي ('+fmt(safeBal)+'). هل تريد الاستمرار؟'))return; }
  }
  const now=new Date();
  const payload={
    type,category:cat,amount:amt,note,
    isoDate:now.toISOString().slice(0,10),
    date:now.toLocaleDateString('ar-EG'),
    time:now.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}),
    createdAt:serverTimestamp()
  };
  if(type==='out')payload.source=source;
  await addDoc(collection(db,'expenses'),payload);
  document.getElementById('exp-amt').value='';document.getElementById('exp-note').value='';
  toast(type==='in'?'&#x1F4B0; تم تسجيل المستلم':(source==='safe'?'&#x1F510; تم الصرف من الخزنة':'&#x1F4B8; تم تسجيل المصروف العام'));
};

};
